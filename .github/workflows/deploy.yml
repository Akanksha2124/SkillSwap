name: SkillSwap CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./AuthService/AuthService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/skillswap-auth-service:latest

      - name: Build and push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./UserService/UserService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/skillswap-user-service:latest

      - name: Build and push Post Service
        uses: docker/build-push-action@v5
        with:
          context: ./PostService/PostService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/skillswap-post-service:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      - name: Update image tags in deployments
        run: |
          kubectl set image deployment/auth-service auth-service=${{ secrets.DOCKER_USERNAME }}/skillswap-auth-service:latest
          kubectl set image deployment/user-service user-service=${{ secrets.DOCKER_USERNAME }}/skillswap-user-service:latest
          kubectl set image deployment/post-service post-service=${{ secrets.DOCKER_USERNAME }}/skillswap-post-service:latest

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/auth-service
          kubectl rollout status deployment/user-service
          kubectl rollout status deployment/post-service