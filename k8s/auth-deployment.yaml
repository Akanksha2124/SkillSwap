apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: akanksha1402/skillswap-auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: ConnectionStrings__DefaultConnection
          value: "Host=auth-db-service;Database=skillswap_auth;Username=postgres;Password=postgres123"
        - name: Jwt__Key
          value: "ThisIsASecretKeyForSkillSwapAndItNeedsToBeLongEnough"
        - name: Jwt__Issuer
          value: "SkillSwap"
        - name: Jwt__Audience
          value: "SkillSwapUsers"
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP